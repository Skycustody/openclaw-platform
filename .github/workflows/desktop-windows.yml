name: Build Desktop (Windows)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python setuptools (needed by node-gyp)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build TypeScript
        run: npm run build

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: List build output
        run: Get-ChildItem -Path release -Recurse | Format-Table Name, Length

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          $exe = Get-ChildItem -Path release -Filter "*.exe" | Select-Object -First 1
          if ($exe) {
            $targetName = "Valnaa-Setup.exe"
            $targetPath = Join-Path release $targetName
            if ($exe.Name -ne $targetName) {
              Copy-Item $exe.FullName $targetPath
            }
            Write-Host "Uploading $targetName ($([math]::Round((Get-Item $targetPath).Length / 1MB, 1)) MB)"
            gh release upload ${{ github.event.inputs.version }} $targetPath --repo Skycustody/valnaa-desktop --clobber
          } else {
            Write-Error "No .exe installer found in release/"
            exit 1
          }
