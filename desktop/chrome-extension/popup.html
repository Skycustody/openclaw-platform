<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      background: #14120b;
      color: #f0efea;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header img { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #22c55e; }
    .dot.disconnected { background: #ef4444; }
    .status-text { font-size: 12px; color: rgba(255,255,255,0.6); }
    .info {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .port-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 12px;
    }
    .port-label { color: rgba(255,255,255,0.4); }
    .port-value { color: rgba(255,255,255,0.7); font-family: monospace; }
    button {
      width: 100%;
      padding: 8px;
      margin-top: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #f0efea;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover { background: rgba(255,255,255,0.12); }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Valnaa" />
    <h1>Valnaa Relay</h1>
  </div>

  <div class="status">
    <div class="dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Checking...</span>
  </div>

  <p class="info">
    Connects your browser to the OpenClaw agent running in Valnaa. The agent can browse and interact with websites through your browser.
  </p>

  <div class="port-row">
    <span class="port-label">Gateway</span>
    <span class="port-value" id="gateway-port">18789</span>
  </div>
  <div class="port-row">
    <span class="port-label">Relay</span>
    <span class="port-value" id="relay-port">18792</span>
  </div>

  <div style="display: flex; gap: 8px;">
    <button id="reconnect-btn" style="flex: 1;">Reconnect</button>
    <button id="disconnect-btn" style="flex: 1; background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.2); color: #f87171;">Disconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
