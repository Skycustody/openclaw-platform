appId: com.valnaa.app
productName: Valnaa
copyright: Copyright © 2026 Valnaa

directories:
  buildResources: assets
  output: release

files:
  - dist/**/*
  - assets/**/*
  - "!src/**/*"
  - "!node_modules/.cache/**/*"

asarUnpack:
  - "node_modules/@vscode/sudo-prompt/**/*"

protocols:
  - name: Valnaa
    schemes:
      - valnaa

mac:
  artifactName: Valnaa-${arch}.${ext}
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: assets/icon.png
  darkModeSupport: true
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false
  notarize: true

dmg:
  title: Valnaa
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 190
    - x: 400
      y: 190
      type: link
      path: /Applications

win:
  artifactName: Valnaa-Setup.${ext}
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.png
  azureSignOptions:
    publisherName: "Nana Zemkwe Mac-Bride"
    endpoint: "https://neu.codesigning.azure.net/"
    certificateProfileName: "valnaa-signing"
    codeSigningAccountName: "Valnaa"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerSidebar: build/installerSidebar.bmp
  uninstallerSidebar: build/uninstallerSidebar.bmp
  installerHeaderIcon: assets/icon.ico
  include: build/installer.nsh

publish:
  provider: github
  owner: Skycustody
  repo: valnaa-desktop
