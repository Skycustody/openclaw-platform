appId: com.valnaa.app
productName: Valnaa
copyright: Copyright © 2026 Valnaa

directories:
  buildResources: assets
  output: release

files:
  - dist/**/*
  - assets/**/*
  - "!src/**/*"
  - "!node_modules/.cache/**/*"

protocols:
  - name: Valnaa
    schemes:
      - valnaa

# Trusted by Gatekeeper: sign with Apple Developer ID + notarize (see desktop/README-APPLE-SIGNING.md)
mac:
  artifactName: Valnaa-${arch}.${ext}
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.png
  darkModeSupport: true
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization (after Team ID + APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD in env):
  # notarize:
  #   teamId: YOUR_TEAM_ID
  # See desktop/README-APPLE-SIGNING.md
  gatekeeperAssess: false

dmg:
  title: Valnaa
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  artifactName: Valnaa-Setup.${ext}
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.png

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true

publish:
  provider: github
  owner: Skycustody
  repo: valnaa-desktop
